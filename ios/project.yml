name: Panshi

options:
  bundleIdPrefix: com.nomadsustaintech
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  Panshi:
    type: application
    platform: iOS
    sources:
      - path: Panshi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nomadsustaintech.panshi
        PRODUCT_NAME: Panshi
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: Panshi/Resources/Info.plist
      properties:
        CFBundleDisplayName: 盤勢
        CFBundleName: Panshi
        CFBundleDevelopmentRegion: zh-Hant
        CFBundleLocalizations:
          - zh-Hant
        UIAppFonts:
          - PanshiDisplay.otf
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.nomadsustaintech.panshi
            CFBundleURLSchemes:
              - panshi
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.reference
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
  PanshiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PanshiTests
    dependencies:
      - target: Panshi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nomadsustaintech.panshi.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Panshi:
    build:
      targets:
        Panshi: all
        PanshiTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - PanshiTests
    run:
      config: Debug
      storeKitConfiguration: StoreKit/Panshi.storekit
    archive:
      config: Release
